calibration:
  fixed_structure_match_tolerance_angstrom: 0.35
  rule_positive_backend_name: "rule_fixed_topology"
  rule_positive_only_reliable: true
  rule_positive_candidate_budget_k: 8
  clean_positive_source: "original_ligand_sdf"
  synthetic_negative_cases:
    - "disconnected"
    - "floating"
    - "extra_attachment"
    - "missing_anchor"

guards:
  rerun_diffsbdd: false
  regenerate_candidates: false
  train_or_finetune_model: false
  modify_diffsbdd_denoising_loop: false
  modify_reliable_repair_fields: false
  local_reconnect_enters_reliable_repair_standard: false
  multi_attachment_is_ligand_invalid: false
